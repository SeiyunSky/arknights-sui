<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>岁家 · 明日方舟</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:#c8a86b; --gold-light:#e8d0a0; --gold-dim:#7a6040;
      --ink:#1a1410; --ink-mid:#2a2018; --ink-light:#3a3028;
      --paper:#f0e8d8; --red-seal:#c0392b;
      --text-main:#e8d8b8; --text-sub:#a09070; --text-dim:#5a5040;
      --border:#3a3020; --glow-gold:rgba(200,168,107,0.45);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{width:100%;height:100%;overflow:hidden}
    body{background:var(--ink);display:flex;justify-content:center;align-items:center;font-family:'Noto Serif SC',serif;user-select:none}
    /* 舞台外背景图 */
    body::before{content:'';position:fixed;inset:0;background:url('https://cdn.jsdelivr.net/gh/SeiyunSky/arknights-sui@main/pic4dec/封面.jpg') center/cover no-repeat;opacity:.1;pointer-events:none;z-index:0}
    #particle-canvas{position:fixed;inset:0;pointer-events:none;z-index:2}

    /* ── 舞台：保持9:16比例居中 ── */
    #book-stage{
      width:min(100vw, 56.25vh); /* 9/16 = 0.5625 */
      height:min(100vh, 177.78vw);
      position:relative;z-index:1;perspective:1200px;
    }

    .book-page{position:absolute;inset:0;border-radius:8px;overflow:hidden;
      transform-origin:left center;transform-style:preserve-3d;backface-visibility:hidden;
      transition:transform .75s cubic-bezier(.4,0,.2,1),opacity .5s;
    }
    .book-page.current{transform:rotateY(0);z-index:3;opacity:1;pointer-events:all}
    .book-page.flip-out{transform:rotateY(-180deg);z-index:4;opacity:.3;pointer-events:none}
    .book-page.flip-in{transform:rotateY(180deg);z-index:4;opacity:.3;pointer-events:none}
    .book-page.next,.book-page.prev{transform:rotateY(0);z-index:1;opacity:1;pointer-events:none;visibility:hidden}

    /* ══ 封面 ══ */
    #page-cover{background:linear-gradient(160deg,#1e180e,#0e0c08);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden}
    #page-cover::before{content:'';position:absolute;inset:0;background:url('https://cdn.jsdelivr.net/gh/SeiyunSky/arknights-sui@main/pic4dec/封面.jpg') center/cover no-repeat;opacity:.2;pointer-events:none;z-index:0}
    .cover-bg-texture{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(200,168,107,.06) 0%,transparent 60%),radial-gradient(ellipse at 20% 30%,rgba(200,168,107,.04) 0%,transparent 40%);pointer-events:none}
    .cover-vert-lines{position:absolute;inset:0;pointer-events:none}
    .cover-vert-lines::before,.cover-vert-lines::after{content:'';position:absolute;top:8%;bottom:8%;width:1px;opacity:.12;background:linear-gradient(180deg,transparent,var(--gold),transparent)}
    .cover-vert-lines::before{left:7%} .cover-vert-lines::after{right:7%}
    .cover-inner{display:flex;flex-direction:column;align-items:center;gap:clamp(10px,2.5vh,20px);padding:clamp(20px,5vh,60px) 10% ;width:100%;position:relative;z-index:1}
    .cover-seal-top{width:clamp(32px,8vw,48px);height:clamp(32px,8vw,48px);border-radius:2px;background:var(--red-seal);display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(192,57,43,.5)}
    .cover-seal-top::before{content:'岁';font-size:clamp(16px,5vw,24px);font-weight:700;color:#f0e8d8;line-height:1}
    .cover-logo-area{width:clamp(120px,40vw,220px);height:clamp(120px,40vw,220px);display:flex;align-items:center;justify-content:center;position:relative}
    .cover-logo-area img{width:100%;height:100%;object-fit:contain;animation:logoFloat 4s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(200,168,107,.4))}
    .cover-logo-area::before{content:'';position:absolute;inset:-8%;border-radius:50%;background:radial-gradient(ellipse,rgba(200,168,107,.12) 0%,transparent 70%);animation:logoAura 4s ease-in-out infinite}
    @keyframes logoFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.02)}}
    @keyframes logoAura{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
    .cover-title-block{display:flex;gap:clamp(8px,3vw,18px);align-items:center}
    .cover-title-vert{display:flex;flex-direction:column;align-items:center;gap:2px}
    .cover-title-vert span{font-size:clamp(18px,6vw,30px);font-weight:700;color:var(--gold-light);text-shadow:0 0 16px rgba(200,168,107,.6),0 0 32px rgba(200,168,107,.3);line-height:1.2;letter-spacing:2px}
    .cover-title-divider{width:1px;height:clamp(40px,12vw,80px);background:linear-gradient(180deg,transparent,var(--gold-dim),transparent)}
    .cover-title-sub{writing-mode:vertical-rl;font-size:clamp(9px,2.5vw,12px);color:var(--text-dim);letter-spacing:4px}
    .cover-bottom-line{width:50%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);margin-top:4px}
    .cover-sub-text{font-size:clamp(10px,3vw,14px);color:var(--gold);letter-spacing:4px;margin-top:8px;padding:4px 16px;border:1px solid rgba(200,168,107,.3);border-radius:2px;z-index:2}
    #page-cover::after{content:'';position:absolute;top:-100%;left:-40%;width:30%;height:300%;background:linear-gradient(100deg,transparent 40%,rgba(200,168,107,.08) 50%,transparent 60%);animation:coverSweep 6s ease-in-out infinite}
    @keyframes coverSweep{0%{transform:translateX(-100%)}70%,100%{transform:translateX(500%)}}
    .cover-hint{position:absolute;bottom:clamp(16px,3vh,36px);color:var(--text-dim);font-size:clamp(9px,2.5vw,12px);letter-spacing:4px;animation:blink 2.5s ease-in-out infinite;z-index:1}
    @keyframes blink{0%,100%{opacity:.3}50%{opacity:.8}}

    /* ══ 角色页 ══ */
    .char-page{width:100%;height:100%;position:relative;background:linear-gradient(180deg,#141008,#0e0c08);display:flex;flex-direction:column;align-items:center;overflow:hidden}
    .char-image-wrap{width:100%;height:68%;position:relative;overflow:hidden;flex-shrink:0;cursor:pointer;background:linear-gradient(180deg,#f0e8d8 0%,#f0e8d8 60%,#0e0c08 100%)}
    .char-image-wrap::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:70%;height:25%;background:radial-gradient(ellipse,var(--char-glow,var(--glow-gold)) 0%,transparent 70%);animation:breathe 3.5s ease-in-out infinite;z-index:2}
    @keyframes breathe{0%,100%{opacity:.5;transform:translateX(-50%) scaleX(1)}50%{opacity:.9;transform:translateX(-50%) scaleX(1.15)}}
    .char-image-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,#0e0c08 95%);pointer-events:none;z-index:2}
    .char-top-bar{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--char-glow,var(--gold)),transparent);z-index:3}
    .char-img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;mix-blend-mode:multiply}
    .char-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:clamp(10px,3vw,14px);letter-spacing:3px;background:linear-gradient(180deg,#1a1408,#0e0c08)}
    .char-quote-overlay{position:absolute;bottom:12%;left:0;right:0;padding:0 5%;z-index:4;pointer-events:none;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s}
    .char-quote-overlay.show{opacity:1;transform:translateY(0)}
    .char-quote-text{font-family:'Ma Shan Zheng',cursive;font-size:clamp(8.8px,2.56vw,12.8px);line-height:2;color:rgba(240,230,200,.92);text-shadow:0 2px 12px rgba(0,0,0,.9),0 0 6px var(--char-glow,rgba(200,168,107,.4));background:rgba(10,8,4,.55);border-left:2px solid var(--char-glow,var(--gold));padding:8px 12px;border-radius:0 4px 4px 0;backdrop-filter:blur(6px);letter-spacing:1px}
    .char-info{width:100%;padding:2% 6% 1%;display:flex;flex-direction:column;gap:3px;position:relative;flex-shrink:0}
    .char-info::before{content:'';position:absolute;left:3%;top:10%;bottom:10%;width:1px;background:linear-gradient(180deg,var(--char-glow,var(--gold-dim)),transparent);opacity:.5}
    .char-name-row{display:flex;align-items:baseline;gap:8px}
    .char-name{font-size:clamp(16px,5vw,24px);font-weight:700;color:var(--gold-light);letter-spacing:4px}
    .char-title{color:var(--text-dim);font-size:clamp(8px,2.5vw,12px);letter-spacing:3px}
    .char-line{height:1px;width:100%;opacity:.4}
    .char-desc{color:var(--text-sub);font-size:clamp(10px,2.8vw,13px);line-height:1.6;letter-spacing:1px}

    /* 小人区域（底部空间） */
    .chibi-area{flex:1;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;position:relative}
    .chibi-area video{height:clamp(80px,22vh,220px);mix-blend-mode:screen;pointer-events:none;position:relative;z-index:1}
    .chibi-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.12;pointer-events:none}

    .char-seal{position:absolute;right:5%;bottom:clamp(28px,5vh,48px);width:clamp(22px,6vw,32px);height:clamp(22px,6vw,32px);border-radius:2px;background:rgba(192,57,43,.7);display:flex;align-items:center;justify-content:center;font-size:clamp(10px,3vw,14px);color:rgba(240,230,200,.9);box-shadow:0 0 6px rgba(192,57,43,.4);letter-spacing:0}
    @keyframes sealBurst{0%{box-shadow:0 0 6px rgba(192,57,43,.4)}30%{box-shadow:0 0 0 8px rgba(192,57,43,.25),0 0 18px rgba(192,57,43,.6)}60%{box-shadow:0 0 0 16px rgba(192,57,43,.08),0 0 28px rgba(192,57,43,.4)}100%{box-shadow:0 0 6px rgba(192,57,43,.4)}}
    .char-seal.burst{animation:sealBurst 1.2s ease-out}

    /* ── 箭头 ── */
    .arrow-btn{position:absolute;top:38%;z-index:10;transform:translateY(-50%);width:clamp(28px,8vw,40px);height:clamp(40px,12vw,60px);display:flex;align-items:center;justify-content:center;cursor:pointer;animation:floatArrow 2.2s ease-in-out infinite}
    .arrow-btn.left{left:2%;--dir:-5px} .arrow-btn.right{right:2%;--dir:5px}
    @keyframes floatArrow{0%,100%{transform:translateY(-50%) translateX(0);opacity:.4}50%{transform:translateY(-50%) translateX(var(--dir));opacity:.9}}
    .arrow-btn svg{width:100%;height:100%;filter:drop-shadow(0 0 5px var(--gold))}

    .close-btn{position:absolute;top:3%;right:3%;z-index:10;width:clamp(24px,7vw,34px);height:clamp(24px,7vw,34px);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.45;transition:opacity .2s}
    .close-btn:hover{opacity:1} .close-btn svg{width:100%;height:100%}

    .page-dots{position:absolute;bottom:clamp(8px,1.5vh,16px);left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:clamp(4px,1vw,8px);align-items:center}
    .pdot{width:clamp(3px,1vw,5px);height:clamp(3px,1vw,5px);border-radius:50%;background:var(--border);transition:all .3s}
    .pdot.active{background:var(--gold);box-shadow:0 0 5px var(--gold);transform:scale(1.5)}

    /* ══ 结尾页（关于我） ══ */
    #page-ending{background:#0e0c08;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(12px,3vh,24px);padding:8% 10%;text-align:center;position:relative;overflow:hidden}
    #page-ending::before{content:'';position:absolute;inset:0;background:url('https://cdn.jsdelivr.net/gh/SeiyunSky/arknights-sui@main/pic4dec/关于我.jpg') center/cover no-repeat;opacity:.5;pointer-events:none;z-index:0}
    .ending-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:clamp(12px,3vh,24px)}
    .ending-seal{width:clamp(40px,12vw,60px);height:clamp(40px,12vw,60px);border-radius:2px;background:var(--red-seal);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(192,57,43,.6);animation:sealPulse 3s ease-in-out infinite;font-size:clamp(16px,5vw,24px);color:#f0e8d8;font-weight:700}
    @keyframes sealPulse{0%,100%{box-shadow:0 0 12px rgba(192,57,43,.5)}50%{box-shadow:0 0 24px rgba(192,57,43,.8)}}
    .ending-line{width:30%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
    .ending-msg{color:var(--text-main);font-size:clamp(12px,3.5vw,16px);line-height:2.4;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.8)}
    .ending-contact{color:var(--text-sub);font-size:clamp(11px,3vw,14px);line-height:2.2;border-top:1px solid rgba(200,168,107,.2);padding-top:clamp(8px,2vh,18px);width:100%;letter-spacing:1px;text-shadow:0 2px 6px rgba(0,0,0,.8)}
    .ending-contact a{color:var(--gold);text-decoration:none}
    .btn-back-cover{color:var(--text-sub);font-size:clamp(10px,2.8vw,13px);letter-spacing:3px;cursor:pointer;transition:color .2s;text-shadow:0 2px 6px rgba(0,0,0,.8)}
    .btn-back-cover:hover{color:var(--gold)}

    /* 关于我（嵌在最后一个角色页底部） */
    .about-me{width:100%;padding:3% 6%;display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;justify-content:center;position:relative;z-index:1}
    .about-me::before{content:'';position:absolute;inset:0;background:url('https://cdn.jsdelivr.net/gh/SeiyunSky/arknights-sui@main/pic4dec/关于我.jpg') center/cover no-repeat;opacity:.4;pointer-events:none}
    .about-line{width:40%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
    .about-msg{color:var(--text-main);font-size:clamp(11px,3vw,14px);line-height:2;letter-spacing:2px;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.8);position:relative}
    .about-contact{color:var(--text-sub);font-size:clamp(10px,2.8vw,13px);line-height:1.9;letter-spacing:1px;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.8);position:relative}

    /* ══ 老十 404 glitch ══ */
    .glitch-page{width:100%;height:100%;position:relative;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;cursor:default}
    .glitch-scanlines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,0.03) 2px,rgba(0,255,0,0.03) 4px);pointer-events:none;z-index:1;animation:scanMove 8s linear infinite}
    @keyframes scanMove{0%{background-position:0 0}100%{background-position:0 100%}}
    .glitch-noise{position:absolute;inset:0;pointer-events:none;z-index:2;opacity:.06;animation:noiseAnim .15s steps(1) infinite}
    @keyframes noiseAnim{0%{background-position:0 0}10%{background-position:-5% -10%}20%{background-position:-15% 5%}30%{background-position:7% -25%}40%{background-position:20% 10%}50%{background-position:-5% 15%}60%{background-position:15% 3%}70%{background-position:0% 10%}80%{background-position:3% 35%}90%{background-position:-10% 10%}100%{background-position:0 0}}
    .glitch-main{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;gap:clamp(8px,2vh,18px);padding:0 8%;width:100%}
    .glitch-404{font-size:clamp(48px,18vw,100px);font-weight:700;color:#0f0;font-family:monospace;letter-spacing:.1em;position:relative;animation:glitch404 3s infinite}
    .glitch-404::before,.glitch-404::after{content:'404';position:absolute;top:0;left:0;width:100%;height:100%}
    .glitch-404::before{color:#f00;clip-path:polygon(0 0,100% 0,100% 35%,0 35%);animation:glitchTop 3s infinite;transform:translateX(-3px)}
    .glitch-404::after{color:#00f;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);animation:glitchBot 3s infinite;transform:translateX(3px)}
    @keyframes glitch404{0%,94%,100%{text-shadow:none}95%{text-shadow:3px 0 #f00,-3px 0 #00f}97%{text-shadow:-4px 0 #f00,4px 0 #00f}}
    @keyframes glitchTop{0%,94%,100%{transform:translateX(-3px);opacity:0}95%{transform:translateX(4px);opacity:.8}97%{transform:translateX(-2px);opacity:.6}}
    @keyframes glitchBot{0%,94%,100%{transform:translateX(3px);opacity:0}95%{transform:translateX(-4px);opacity:.8}97%{transform:translateX(2px);opacity:.6}}
    .glitch-label{font-family:monospace;font-size:clamp(10px,3vw,14px);color:#0f0;letter-spacing:.2em;animation:blink404 1.2s step-end infinite}
    @keyframes blink404{0%,100%{opacity:1}50%{opacity:0}}
    .glitch-corrupt{font-family:monospace;font-size:clamp(9px,2.5vw,12px);color:rgba(0,255,0,.5);letter-spacing:.1em;line-height:2;text-align:center;animation:corruptShift 4s infinite}
    @keyframes corruptShift{0%,90%,100%{transform:translateX(0);filter:none}91%{transform:translateX(-6px);filter:hue-rotate(90deg)}93%{transform:translateX(4px);filter:hue-rotate(180deg)}95%{transform:translateX(-2px);filter:none}}
    .glitch-bar{width:60%;height:2px;background:linear-gradient(90deg,transparent,#0f0,transparent);animation:barScan 2s linear infinite;position:relative}
    @keyframes barScan{0%{opacity:0;transform:scaleX(.2)}30%{opacity:1}70%{opacity:1}100%{opacity:0;transform:scaleX(.2)}}
    .glitch-tear{position:absolute;left:0;right:0;height:3px;background:rgba(255,0,0,.4);animation:tearMove 5s linear infinite;z-index:4;pointer-events:none;box-shadow:0 0 8px rgba(255,0,0,.6)}
    @keyframes tearMove{0%{top:-10px;opacity:0}10%{opacity:1}90%{opacity:.5}100%{top:110%;opacity:0}}
    .glitch-close{position:absolute;top:3%;right:3%;z-index:10;width:clamp(24px,7vw,34px);height:clamp(24px,7vw,34px);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.45;transition:opacity .2s}
    .glitch-close:hover{opacity:1}
    .glitch-arrows{position:absolute;top:38%;z-index:10;transform:translateY(-50%);width:clamp(28px,8vw,40px);height:clamp(40px,12vw,60px);display:flex;align-items:center;justify-content:center;cursor:pointer;animation:floatArrow 2.2s ease-in-out infinite}
    .glitch-arrows.left{left:2%;--dir:-5px} .glitch-arrows.right{right:2%;--dir:5px}

    /* ── 音乐 ── */
    #music-btn{position:fixed;top:clamp(8px,2vh,18px);right:clamp(8px,2vw,18px);width:clamp(30px,8vw,40px);height:clamp(30px,8vw,40px);border-radius:2px;background:rgba(20,16,8,.9);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:clamp(12px,3.5vw,16px);display:flex;align-items:center;justify-content:center;z-index:100;transition:border-color .2s,color .2s,box-shadow .2s}
    #music-btn.on{border-color:var(--gold);color:var(--gold);box-shadow:0 0 8px rgba(200,168,107,.4)}
  </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>
<button id="music-btn">♪</button>
<audio id="bgm" loop src="https://cdn.jsdelivr.net/gh/SeiyunSky/arknights-sui@main/mp3/滋味常.mp3"></audio>
<audio id="voice-audio"></audio>

<div id="book-stage">
  <!-- 封面 -->
  <div class="book-page current" id="page-cover">
    <div style="width:100%;height:100%" onclick="startBook()">
      <div class="cover-bg-texture"></div>
      <div class="cover-vert-lines"></div>
      <div class="cover-inner">
        <div class="cover-seal-top"></div>
        <div class="cover-logo-area"><img src="https://cdn.jsdelivr.net/gh/SeiyunSky/arknights-sui@main/pic4dec/模组_人间百味.png" alt="人间百味"></div>
        <div class="cover-title-block">
          <div class="cover-title-vert"><span>岁</span><span>家</span></div>
          <div class="cover-title-divider"></div>
          <div class="cover-title-sub">SUI · FAMILY</div>
        </div>
        <div class="cover-bottom-line"></div>
        <div class="cover-sub-text" style="cursor:pointer" onclick="event.stopPropagation();goToPage(characters.length)">关于我</div>
      </div>
      <div class="cover-hint">点击翻开</div>
    </div>
  </div>

  <!-- 角色页（JS生成，最后一页含关于我） -->
</div>

<script>
const CDN = 'https://cdn.jsdelivr.net/gh/SeiyunSky/arknights-sui@main/';
const CHIBI_DEFAULT = CDN+'items/"小自在"-青玉砚-战斗-Idle-x1.webm';
const medals = [
  CDN+'pic4dec/1.png',CDN+'pic4dec/2.png',
  CDN+'pic4dec/medal_rogue_5_03.png',CDN+'pic4dec/medal_rogue_5_04.png',
  CDN+'pic4dec/medal_rogue_5_05.png',CDN+'pic4dec/medal_rogue_5_06.png',
  CDN+'pic4dec/medal_rogue_5_07.png',CDN+'pic4dec/medal_rogue_5_08.png',
  CDN+'pic4dec/medal_rogue_5_09.png',CDN+'pic4dec/medal_rogue_5_10.png',
  CDN+'pic4dec/medal_rogue_5_11.png',CDN+'pic4dec/medal_rogue_5_12.png',
];
// 底部场景图（循环分配给12个角色页）

  ending.className='book-page prev'; ending.id='page-ending-13';
  ending.innerHTML=`
    <div class="char-page">
      <div class="close-btn" onclick="goToPage(0)">
        <svg viewBox="0 0 18 18" fill="none"><line x1="3" y1="3" x2="15" y2="15" stroke="#c8a86b" stroke-width="1.5" stroke-linecap="round"/><line x1="15" y1="3" x2="3" y2="15" stroke="#c8a86b" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="char-image-wrap" style="--char-glow:rgba(200,168,107,0.5);cursor:default">
        <div class="char-top-bar"></div>
        <img class="char-img" src="${CDN}pic4dec/我.jpg" style="object-fit:contain;background:#fff">
      </div>
      <div class="char-info" style="--char-glow:rgba(200,168,107,0.5)">
        <div class="char-name-row">
          <div class="char-name" style="text-shadow:0 0 12px rgba(200,168,107,0.5)">沫路</div>
        </div>
        <div class="char-line" style="background:linear-gradient(90deg,rgba(200,168,107,0.5),transparent)"></div>
        <div class="char-desc" style="font-style:italic;color:var(--text-dim)">祝您生活愉快，博士。</div>
      </div>
      <div class="chibi-area">
        <div class="chibi-bg" style="background-image:url('${CDN}pic4dec/关于我.jpg')"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1;padding:0 8%">
          <div class="about-line" style="width:40%;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)"></div>
          <div class="about-msg" style="color:var(--text-main);font-size:clamp(11px,3vw,14px);line-height:2;letter-spacing:2px;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.8)">祝您生活愉快，博士。</div>
          <div class="about-msg" style="color:var(--text-sub);font-size:clamp(10px,2.8vw,13px);line-height:1.8;letter-spacing:1px;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.8)">沫沫人生，陌陌你我。</div>
        </div>
      </div>
      <div class="char-seal">岁</div>
      <div class="arrow-btn left" onclick="goToPage(${characters.length})"><svg viewBox="0 0 26 46" fill="none"><polyline points="18,3 7,23 18,43" stroke="#c8a86b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="arrow-btn right" onclick="goToPage(0)" style="opacity:.3"><svg viewBox="0 0 26 46" fill="none"><polyline points="8,3 19,23 8,43" stroke="#7a6040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>`;
  stage.appendChild(ending);
}

function initPages(){
  buildCharPages();
  pages=[document.getElementById('page-cover'),...characters.map((_,i)=>document.getElementById(`page-char-${i}`)),document.getElementById('page-ending-13')];
  pages.forEach((p,i)=>{p.className='book-page '+(i===0?'current':'prev');p.style.zIndex=totalPages-i;if(i!==0)p.style.visibility='hidden'});
}

function activateVideos(el){
  el.querySelectorAll('video').forEach(v=>{
    if(!v.src && v.dataset.src){v.src=v.dataset.src}
    v.muted=true;v.play().catch(()=>{});
  });
}

function goToPage(idx){
  if(isAnimating||idx===currentIdx)return;
  if(idx<0||idx>=totalPages)return;
  if(!pages[idx])return;
  isAnimating=true;
  const from=pages[currentIdx],to=pages[idx],fwd=idx>currentIdx;
  document.getElementById('voice-audio').pause();
  document.querySelectorAll('.char-quote-overlay').forEach(el=>el.classList.remove('show'));
  if(fwd){
    from.style.zIndex=totalPages+1;from.classList.remove('current');from.classList.add('flip-out');
    setTimeout(()=>{to.style.zIndex=totalPages;to.style.visibility='visible';to.classList.remove('prev','next','flip-in');to.classList.add('current');
      activateVideos(to);
    },350);
  }else{
    to.style.zIndex=totalPages+1;to.style.visibility='visible';to.classList.remove('prev','next');to.classList.add('flip-in');
    void to.offsetWidth;to.classList.remove('flip-in');to.classList.add('current');
    from.style.zIndex=totalPages;from.classList.remove('current');from.classList.add('next');
    to.querySelectorAll('video').forEach(v=>{v.muted=true;v.play().catch(()=>{})});
  }
  setTimeout(()=>{from.classList.remove('flip-out','next','current','flip-in');from.classList.add(fwd?'prev':'next');from.style.zIndex='';from.style.visibility='';to.style.zIndex='';currentIdx=idx;isAnimating=false;playPageVoice();
    activateVideos(to);
  },780);
}

function startBook(){goToPage(1)}

const voiceAudio=document.getElementById('voice-audio');
function randomVoice(ci){const c=characters[ci];if(!c.voices||!c.voices.length)return null;return c.voices[Math.floor(Math.random()*c.voices.length)]}
function randomQuote(ci){const c=characters[ci];if(!c.quotes||!c.quotes.length)return null;return c.quotes[Math.floor(Math.random()*c.quotes.length)]}
let quoteTimer=null;
function scheduleHideQuote(overlay){
  if(quoteTimer)clearTimeout(quoteTimer);
  quoteTimer=setTimeout(()=>{overlay.classList.remove('show');quoteTimer=null},5000);
}
function playVoice(ci){
  const c=characters[ci];
  const q=randomQuote(ci);
  const overlay=document.getElementById(`overlay-${ci}`);
  const txt=document.getElementById(`quote-text-${ci}`);
  voiceAudio.pause();
  const src=randomVoice(ci);
  if(src){voiceAudio.src=src;voiceAudio.play().catch(()=>{})}
  if(!q||!overlay||!txt)return;
  if(overlay.classList.contains('show')){
    overlay.classList.remove('show');
    setTimeout(()=>{txt.textContent=q;overlay.classList.add('show');scheduleHideQuote(overlay)},520);
  }else{
    txt.textContent=q;
    overlay.classList.add('show');
    scheduleHideQuote(overlay);
  }
}
function playPageVoice(){
  const ci=currentIdx-1;
  if(ci>=0&&ci<characters.length){
    const c=characters[ci];
    if(c.glitch)return;
    // 翻页时显示第一条台词
    if(c.showQuote && c.quotes && c.quotes.length){
      const overlay=document.getElementById(`overlay-${ci}`);
      const txt=document.getElementById(`quote-text-${ci}`);
      if(txt) txt.textContent=c.quotes[0];
      if(overlay){overlay.classList.add('show');scheduleHideQuote(overlay);}
    }
    const src=randomVoice(ci);
    if(src){voiceAudio.src=src;voiceAudio.play().catch(()=>{})}
    else{
      // 无语音：触发印章脉冲
      const seal=document.querySelector(`#page-char-${ci} .char-seal`);
      if(seal){seal.classList.remove('burst');void seal.offsetWidth;seal.classList.add('burst');}
    }
  }
}

let musicOn=true;const bgm=document.getElementById('bgm');bgm.volume=.5;
bgm.play().catch(()=>{document.addEventListener('click',function t(){bgm.play().catch(()=>{})},{once:true})});
document.getElementById('music-btn').textContent='♫';document.getElementById('music-btn').classList.add('on');
document.getElementById('music-btn').addEventListener('click',()=>{musicOn=!musicOn;const b=document.getElementById('music-btn');b.textContent=musicOn?'♫':'♪';b.classList.toggle('on',musicOn);if(musicOn)bgm.play().catch(()=>{});else bgm.pause()});

(function(){const c=document.getElementById('particle-canvas'),x=c.getContext('2d');let W,H;
const d=Array.from({length:110},()=>({x:Math.random()*1400,y:Math.random()*900,r:Math.random()*2.8+.4,vx:(Math.random()-.5)*.5,vy:-Math.random()*.4-.1,a:Math.random()*.3+.07}));
const l=Array.from({length:22},()=>({x:Math.random()*1400,y:Math.random()*900,h:Math.random()*55+15,vy:-.6-Math.random()*.5,a:Math.random()*.18+.07}));
function r(){W=c.width=innerWidth;H=c.height=innerHeight;
  d.forEach(p=>{if(Math.random()<.5){p.x=W*.25+Math.random()*W*.5}});
}
addEventListener('resize',r);r();
(function draw(){x.clearRect(0,0,W,H);d.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0){p.y=H;p.a=Math.random()*.3+.07}if(p.y>H)p.y=0;const fade=Math.max(0,p.y/H);x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle='#c8a86b';x.globalAlpha=p.a*fade;x.fill()});
l.forEach(p=>{p.y+=p.vy;if(p.y<-50){p.y=H+50;p.a=Math.random()*.18+.07}const fade=Math.max(0,p.y/H);x.beginPath();x.moveTo(p.x,p.y);x.lineTo(p.x,p.y+p.h);x.strokeStyle='#c8a86b';x.globalAlpha=p.a*fade;x.lineWidth=.8;x.stroke()});x.globalAlpha=1;requestAnimationFrame(draw)})()})();
initPages();
// 翻页时触发当前页 video 播放（在用户手势上下文内）
document.addEventListener('click', function(){
  const cur = document.querySelector('.book-page.current');
  if (cur) activateVideos(cur);
});
</script>
